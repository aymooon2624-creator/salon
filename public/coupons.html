<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>العروض - صالون الشايب</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-logo">🎟️ <span>العروض</span></div>
      <nav class="header-nav">
        <button class="btn btn-secondary btn-sm" onclick="location.href='index.html'">الرئيسية</button>
        <span id="userDisplay"></span>
        <button class="btn btn-secondary btn-sm" id="logoutBtn" onclick="handleLogout()">تسجيل خروج</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card" style="max-width:600px;margin:0 auto 24px;">
      <h2 style="margin-bottom:16px;">🔍 تحقق من كود الخصم</h2>
      <form id="validateCouponForm">
        <div class="flex gap-12" style="align-items:flex-end;">
          <div class="form-group" style="flex:1;margin-bottom:0;">
            <input type="text" class="form-input" id="couponCode" placeholder="أدخل كود الخصم" required>
          </div>
          <button type="submit" class="btn btn-primary">تحقق</button>
        </div>
      </form>
      <div id="couponResult"></div>
    </div>

    <h1 style="text-align:center;margin:30px 0;">🎟️ العروض المتاحة</h1>
    <div id="couponsList"></div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/coupons.js"></script>
</body>
</html>
