<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل جديد - صالون الشايب</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>✂️ صالون الشايب</h1>
      <p class="subtitle">إنشاء حساب جديد</p>

      <form id="registerForm">
        <div class="form-group">
          <label>👤 اسم المستخدم</label>
          <input type="text" class="form-input" id="username" placeholder="3 أحرف على الأقل" required minlength="3">
        </div>
        <div class="form-group">
          <label>🔑 كلمة المرور</label>
          <input type="password" class="form-input" id="password" placeholder="6 أحرف على الأقل" required minlength="6">
        </div>
        <div class="form-group">
          <label>📱 رقم الهاتف</label>
          <input type="tel" class="form-input" id="phone" placeholder="05XXXXXXXX" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">تسجيل</button>
      </form>

      <div class="auth-divider">لديك حساب؟</div>

      <a href="login.html" class="btn btn-secondary" style="width:100%;text-align:center;display:block;">تسجيل الدخول</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
