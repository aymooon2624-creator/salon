<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - صالون الشايب</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>✂️ صالون الشايب</h1>
      <p class="subtitle">تسجيل الدخول إلى حسابك</p>

      <form id="loginForm">
        <div class="form-group">
          <label>👤 اسم المستخدم</label>
          <input type="text" class="form-input" id="username" placeholder="أدخل اسم المستخدم" required>
        </div>
        <div class="form-group">
          <label>🔑 كلمة المرور</label>
          <input type="password" class="form-input" id="password" placeholder="أدخل كلمة المرور" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">تسجيل الدخول</button>
      </form>

      <div class="auth-divider">أو</div>

      <a href="register.html" class="btn btn-secondary" style="width:100%;text-align:center;display:block;">تسجيل جديد</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
