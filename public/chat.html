<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الدردشة - صالون الشايب</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-logo">💬 <span>الدردشة</span></div>
      <nav class="header-nav">
        <button class="btn btn-secondary btn-sm" onclick="location.href='index.html'">الرئيسية</button>
        <span id="userDisplay"></span>
        <button class="btn btn-secondary btn-sm" id="logoutBtn" onclick="handleLogout()">تسجيل خروج</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="chat-container">
      <div class="chat-sidebar" id="conversationsView">
        <div class="chat-sidebar-header">
          <h3>💬 المحادثات</h3>
        </div>
        <div id="conversationsList"></div>
      </div>

      <div class="chat-main" id="messageArea" style="display:none;">
        <div class="chat-main-header">
          <button class="btn btn-secondary btn-sm" onclick="backToConversations()">← رجوع</button>
          <h3 id="chatPartnerName"></h3>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <form id="chatForm" class="chat-input-area">
          <input type="text" class="form-input" id="chatInput" placeholder="اكتب رسالتك..." required style="flex:1;margin:0;">
          <button type="submit" class="btn btn-primary">إرسال</button>
        </form>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
